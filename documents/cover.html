<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    @page { size: 794px 1123px; margin: 0; }
    html, body { margin: 0; padding: 0; background: #fff; width: 794px; height: 1123px; }
    .cover { position: relative; width: 794px; height: 1123px; background: #fff; overflow: hidden; }
    .bg-layer { position: absolute; inset: 0; overflow: hidden; z-index: 1; }
    .watermark { position: absolute; right: 60px; top: 0; height: 100%; display: flex; align-items: center; }
    .watermark span { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 130pt; color: #24738d; opacity: 0.035; transform: rotate(90deg); letter-spacing: 6px; }
    .dash { position: absolute; left: 95px; top: 200px; width: 50px; height: 5px; background: #24738d; }
    .meta-line { position: absolute; left: 95px; top: 810px; width: 2px; height: 55px; background: #24738d; opacity: 0.5; }
    .content { position: absolute; inset: 0; z-index: 3; }
    .kicker { position: absolute; left: 95px; top: 247px; font-family: 'Inter', sans-serif; font-weight: 400; font-size: 13pt; letter-spacing: 3px; color: #24738d; opacity: 0.6; text-transform: uppercase; }
    .hero { position: absolute; left: 95px; top: 337px; font-family: 'Inter', sans-serif; font-weight: 900; font-size: 50pt; line-height: 1.1; color: #232527; max-width: 420px; }
    .summary { position: absolute; left: 95px; top: 530px; font-family: 'Inter', sans-serif; font-weight: 300; font-size: 14pt; line-height: 1.6; color: #232527; opacity: 0.85; max-width: 420px; }
    .meta { position: absolute; left: 115px; top: 825px; font-family: 'Inter', sans-serif; font-weight: 400; font-size: 17pt; line-height: 2; color: #232527; }
    .footer { position: absolute; right: 95px; bottom: 67px; font-family: 'Inter', sans-serif; font-weight: 400; font-size: 11pt; letter-spacing: 2px; color: #24738d; opacity: 0.5; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="cover">
    <div class="bg-layer"><div class="watermark"><span>CONNECT BOLIVIA</span></div></div>
    <div class="dash"></div>
    <div class="meta-line"></div>
    <div class="content">
      <div class="kicker">Estrategia Comercial 2025</div>
      <div class="hero">CONNECT<br>Bolivia</div>
      <div class="summary">Plataforma de monitoreo mediatico inteligente impulsada por el motor ONION200. Analisis en tiempo real de presencia, sentimiento y conflictividad en medios bolivianos.</div>
      <div class="meta">News Connect Bolivia<br>Mayo 2025<br>v0.7.0</div>
      <div class="footer">Documento Confidencial</div>
    </div>
  </div>
</body>
</html>
